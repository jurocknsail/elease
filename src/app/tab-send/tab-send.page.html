<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Envois
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-progress-bar [value]="progress" color="primary" *ngIf="progress > 0"></ion-progress-bar>

  <div class="ion-padding-horizontal ion-padding-top">
    <h1 class="ion-no-margin ion-margin-bottom" style="font-weight: 700; color: var(--ion-color-dark);">Envois PDF</h1>
  </div>

  <div class="premium-card">
    <ion-item lines="none">
      <ion-icon name="calendar-outline" slot="start" color="primary"></ion-icon>
      <ion-label>
        <h3 style="font-weight: 500;">Période de facturation</h3>
        <p>Date d'échéance par défaut</p>
      </ion-label>
      <ion-datetime-button datetime="datetime"></ion-datetime-button>
    </ion-item>
  </div>

  <ion-modal [keepContentsMounted]="true">
    <ng-template>
      <ion-datetime locale="fr-FR" (ionChange)="setDate($event)" value="{{ defaultSendDate  | date:'YYYY-MM-dd'}}" presentation="date" [showDefaultButtons]="true" id="datetime">
        <span slot="title">Date d'échéance</span>
      </ion-datetime>
    </ng-template>
  </ion-modal>

  <div class="ion-padding-horizontal">
    <p style="color: var(--ion-color-medium); font-size: 0.9rem; font-weight: 500;">SÉLECTION DES BAUX</p>
  </div>

  <div *ngFor="let leaseholder of leaseholders; let last = last" [class.ion-margin-bottom]="!last">
    <div class="premium-card ion-no-margin" style="box-shadow: none; border: 1px solid var(--ion-color-light);">
      <ion-item lines="none" class="ion-no-border">
        <ion-icon name="person-outline" slot="start" size="small" color="primary" style="margin-right: 8px;"></ion-icon>
        <ion-label style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
          <h2 style="font-weight: 600; font-size: 1rem; margin: 0;">{{ leaseholder.name }}</h2>
          <p style="font-size: 0.8rem; margin: 0; color: var(--ion-color-medium);">{{ leaseholder.email }}</p>
        </ion-label>
      </ion-item>

      <ion-list lines="none" style="padding: 0;">
        <ion-item *ngFor="let lease of leaseholder.leases" class="ion-no-padding-start" style="--min-height: 40px;">
          <ion-checkbox [(ngModel)]="lease.isSelected" (ionChange)="onSelectionChange(leaseholder)" slot="start" mode="ios" color="primary"></ion-checkbox>
          <ion-label style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
            <h3 style="font-weight: 500; margin: 0; font-size: 0.9rem;">{{ lease.name }}</h3>
            <p style="font-size: 0.8rem; margin: 0; color: var(--ion-color-medium);">{{ lease.city }}</p>
          </ion-label>
        </ion-item>
      </ion-list>
    </div>
  </div>

  <div style="height: 80px;"></div>

  <ion-fab slot="fixed" vertical="bottom" horizontal="center">
    <ion-button (click)="generatePdf()" color="primary" shape="round" style="height: 56px; width: 220px; --box-shadow: 0 4px 16px rgba(var(--ion-color-primary-rgb), 0.3);">
      <ion-icon name="document-text-outline" slot="start"></ion-icon>
      Générer les PDFs
    </ion-button>
  </ion-fab>
</ion-content>
